<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الترتيب - El7amla Fantasy League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #0f172a;
      --bg-card:       #1e293b;
      --bg-card-alt:   #162032;
      --border:        #334155;
      --border-glow:   #3b82f6;
      --text-primary:  #f1f5f9;
      --text-muted:    #94a3b8;
      --blue-accent:   #3b82f6;
      --blue-dark:     #1d4ed8;
      --gold:          #fbbf24;
      --gold-2:        #f59e0b;
      --silver:        #cbd5e1;
      --bronze:        #cd7c3e;
      --live-green:    #22c55e;
      --row-hover:     rgba(59,130,246,.08);
      --rank1-bg:      linear-gradient(90deg,rgba(251,191,36,.12) 0%,rgba(251,191,36,.03) 100%);
      --rank2-bg:      linear-gradient(90deg,rgba(203,213,225,.09) 0%,rgba(203,213,225,.02) 100%);
      --rank3-bg:      linear-gradient(90deg,rgba(205,124,62,.10) 0%,rgba(205,124,62,.02) 100%);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      direction: rtl;
    }

    /* ── HEADER ────────────────────────────────────── */
    .site-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 20px;
      text-align: center;
    }

    .league-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 3.5vw, 1.9rem);
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #60a5fa, #f1f5f9, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .league-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* live badge */
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.4);
      color: var(--live-green);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 10px;
      text-transform: uppercase;
    }
    .live-badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--live-green);
      animation: pulse 1.4s infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%{ opacity:.4; transform:scale(1.3); }
    }

    /* ── NAV ────────────────────────────────────────── */
    .site-nav {
      background: rgba(15,23,42,.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      gap: 0;
    }
    .nav-inner a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 14px 24px;
      transition: color .2s, background .2s;
      border-bottom: 3px solid transparent;
      display: block;
    }
    .nav-inner a:hover,
    .nav-inner a.active {
      color: var(--blue-accent);
      border-bottom-color: var(--blue-accent);
      background: rgba(59,130,246,.06);
    }

    /* ── MAIN ───────────────────────────────────────── */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    /* section heading */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      margin-top: 40px;
    }
    .section-heading:first-of-type { margin-top: 0; }

    .section-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
    }
    .icon-teams  { background: linear-gradient(135deg,#1d4ed8,#3b82f6); }
    .icon-players{ background: linear-gradient(135deg,#7c3aed,#a78bfa); }

    .section-title {
      font-family: 'Cairo', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--text-primary);
    }
    .section-title small {
      display: block;
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── TABLE WRAPPER ──────────────────────────────── */
    .table-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0,0,0,.4);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead tr {
      background: linear-gradient(90deg,#1d4ed8,#2563eb);
    }
    thead th {
      padding: 13px 14px;
      text-align: center;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: .5px;
      color: #e0eaff;
      white-space: nowrap;
    }
    thead th:first-child { text-align: center; }

    tbody tr {
      border-bottom: 1px solid rgba(51,65,85,.6);
      transition: background .18s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--row-hover); }

    /* rank colour rows */
    tbody tr.rank-1 { background: var(--rank1-bg); }
    tbody tr.rank-2 { background: var(--rank2-bg); }
    tbody tr.rank-3 { background: var(--rank3-bg); }
    tbody tr.rank-1:hover { background: linear-gradient(90deg,rgba(251,191,36,.18) 0%,rgba(251,191,36,.06) 100%); }
    tbody tr.rank-2:hover { background: linear-gradient(90deg,rgba(203,213,225,.15) 0%,rgba(203,213,225,.05) 100%); }
    tbody tr.rank-3:hover { background: linear-gradient(90deg,rgba(205,124,62,.16) 0%,rgba(205,124,62,.05) 100%); }

    tbody td {
      padding: 13px 14px;
      text-align: center;
      vertical-align: middle;
    }

    /* rank badge */
    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px;
      font-weight: 900;
      font-size: 0.85rem;
    }
    .rank-badge.gold   { background: linear-gradient(135deg,#fbbf24,#f59e0b); color:#78350f; }
    .rank-badge.silver { background: linear-gradient(135deg,#e2e8f0,#94a3b8); color:#1e293b; }
    .rank-badge.bronze { background: linear-gradient(135deg,#cd7c3e,#92400e); color:#fef3c7; }
    .rank-badge.other  { background: rgba(51,65,85,.8); color:var(--text-muted); }

    /* team name */
    .team-name {
      font-weight: 700;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .team-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* points highlight */
    .pts-total {
      font-weight: 900;
      font-size: 1rem;
      color: var(--blue-accent);
    }
    .pts-match { color: var(--text-primary); font-weight: 700; }
    .pts-bonus { color: var(--gold); font-weight: 700; }

    /* player points */
    .player-pts {
      font-weight: 900;
      font-size: 1rem;
      color: #a78bfa;
    }

    /* team pill for player table */
    .team-pill {
      display: inline-block;
      background: rgba(59,130,246,.15);
      border: 1px solid rgba(59,130,246,.3);
      color: #93c5fd;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ── LOADING / ERROR ────────────────────────────── */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-box p { font-size: 1rem; }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(59,130,246,.2);
      border-top-color: var(--blue-accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER META ────────────────────────────────── */
    .meta-footer {
      margin-top: 40px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .meta-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .meta-chip span { color: var(--text-primary); font-weight: 700; }

    /* ── RESPONSIVE ─────────────────────────────────── */
    @media (max-width: 700px) {
      thead th, tbody td { padding: 10px 8px; font-size: 0.78rem; }
      .league-title { font-size: 1rem; }
      .nav-inner a { padding: 12px 14px; font-size: 0.82rem; }
      .section-title { font-size: 1.1rem; }
      /* hide less-critical columns on mobile */
      .hide-sm { display: none; }
    }
  </style>
</head>
<body>

<!-- ════════════ HEADER ════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="league-title">El7amla 2v2 Fantasy League 2025/26</div>
    <div class="league-subtitle">Season Rankings</div>
    <div class="live-badge">مباشر</div>
  </div>
</header>

<!-- ════════════ NAV ════════════ -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html">الرئيسية</a>
    <a href="teams.html">الفرق</a>
    <a href="standings.html" class="active">الترتيب</a>
    <a href="matches.html">المباريات</a>
  </div>
</nav>

<!-- ════════════ MAIN ════════════ -->
<main class="main-content">

  <!-- ── Teams table ── -->
  <div class="section-heading">
    <div class="section-icon icon-teams">🏆</div>
    <div class="section-title">
      ترتيب الفرق
      <small>Team Standings</small>
    </div>
  </div>

  <div class="table-wrap" id="teams-wrap">
    <div class="state-box"><div class="spinner"></div><p>جارٍ تحميل البيانات…</p></div>
  </div>

  <!-- ── Players table ── -->
  <div class="section-heading">
    <div class="section-icon icon-players">⚡</div>
    <div class="section-title">
      ترتيب اللاعبين
      <small>Player Rankings</small>
    </div>
  </div>

  <div class="table-wrap" id="players-wrap">
    <div class="state-box"><div class="spinner"></div><p>جارٍ تحميل البيانات…</p></div>
  </div>

  <!-- ── Meta footer ── -->
  <div class="meta-footer" id="meta-footer" style="display:none">
    <div class="meta-chip">📅 آخر تحديث: <span id="meta-updated">—</span></div>
    <div class="meta-chip">🗓️ الجولة الحالية: <span id="meta-gw">—</span></div>
  </div>

</main>

<!-- ════════════ SCRIPT ════════════ -->
<script>
  /* Team dot colours by name */
  const TEAM_COLORS = {
    'Falcons':      '#3b82f6',
    'Smokers':      '#22c55e',
    'Black Tech':   '#a855f7',
    'Boys':         '#f97316',
    'The Pharaohs': '#eab308',
  };

  function rankBadge(rank) {
    const map = { 1: ['gold','🥇'], 2: ['silver','🥈'], 3: ['bronze','🥉'] };
    if (map[rank]) {
      const [cls, icon] = map[rank];
      return `<span class="rank-badge ${cls}">${icon}</span>`;
    }
    return `<span class="rank-badge other">${rank}</span>`;
  }

  function buildTeamsTable(teams) {
    if (!teams || teams.length === 0) {
      return `<div class="state-box"><div class="icon">📭</div><p>لا توجد بيانات فرق متاحة</p></div>`;
    }

    const rows = teams.map((t, i) => {
      const rank = i + 1;
      const cls  = rank <= 3 ? `rank-${rank}` : '';
      const color = TEAM_COLORS[t.name] || '#64748b';
      return `
        <tr class="${cls}">
          <td>${rankBadge(rank)}</td>
          <td>
            <div class="team-name">
              <span class="team-dot" style="background:${color}"></span>
              ${t.name}
            </div>
          </td>
          <td class="hide-sm">${t.played}</td>
          <td class="hide-sm">${t.won}</td>
          <td class="hide-sm">${t.draw}</td>
          <td class="hide-sm">${t.lost}</td>
          <td><span class="pts-match">${t.matchPts}</span></td>
          <td><span class="pts-bonus">${t.bonus}</span></td>
          <td><span class="pts-total">${t.total}</span></td>
        </tr>`;
    }).join('');

    return `
      <table>
        <thead>
          <tr>
            <th>المركز</th>
            <th>الفريق</th>
            <th class="hide-sm">لعب</th>
            <th class="hide-sm">فوز</th>
            <th class="hide-sm">تعادل</th>
            <th class="hide-sm">خسارة</th>
            <th>نقاط الماتشات</th>
            <th>بونص</th>
            <th>الإجمالي</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function buildPlayersTable(players) {
    if (!players || players.length === 0) {
      return `<div class="state-box"><div class="icon">📭</div><p>لا توجد بيانات لاعبين متاحة</p></div>`;
    }

    const rows = players.map((p, i) => {
      const rank = i + 1;
      const cls  = rank <= 3 ? `rank-${rank}` : '';
      return `
        <tr class="${cls}">
          <td>${rankBadge(rank)}</td>
          <td style="font-weight:700">${p.name}</td>
          <td><span class="team-pill">${p.team}</span></td>
          <td><span class="player-pts">${p.points.toLocaleString()}</span></td>
        </tr>`;
    }).join('');

    return `
      <table>
        <thead>
          <tr>
            <th>المركز</th>
            <th>اللاعب</th>
            <th>الفريق</th>
            <th>النقاط</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function showError(wrapperId, msg) {
    document.getElementById(wrapperId).innerHTML = `
      <div class="state-box">
        <div class="icon">⚠️</div>
        <p>${msg}</p>
      </div>`;
  }

  async function loadStandings() {
    const url = `https://raw.githubusercontent.com/El7amla/El7amla_WebSite/main/data/current_standings.json?v=${Date.now()}`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      document.getElementById('teams-wrap').innerHTML   = buildTeamsTable(data.teams);
      document.getElementById('players-wrap').innerHTML = buildPlayersTable(data.players);

      // meta footer
      if (data.last_updated || data.current_gw) {
        document.getElementById('meta-updated').textContent = data.last_updated || '—';
        document.getElementById('meta-gw').textContent      = data.current_gw   || '—';
        document.getElementById('meta-footer').style.display = 'flex';
      }

    } catch (err) {
      console.error('Failed to load standings:', err);
      const errMsg = 'فشل تحميل البيانات. يرجى المحاولة مجدداً.';
      showError('teams-wrap',   errMsg);
      showError('players-wrap', errMsg);
    }
  }

  loadStandings();
</script>
</body>
</html>
