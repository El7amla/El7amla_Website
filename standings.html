<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الترتيب - El7amla Fantasy League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:   #0f172a;
      --bg-card:      #1e293b;
      --border:       #334155;
      --text-primary: #f1f5f9;
      --text-muted:   #94a3b8;
      --blue-accent:  #3b82f6;
      --blue-dark:    #1d4ed8;
      --gold:         #fbbf24;
      --green:        #22c55e;
      --red:          #ef4444;
      --live-green:   #22c55e;
      --row-hover:    rgba(59,130,246,.08);
      --rank1-bg:     linear-gradient(90deg,rgba(251,191,36,.12) 0%,rgba(251,191,36,.03) 100%);
      --rank2-bg:     linear-gradient(90deg,rgba(203,213,225,.09) 0%,rgba(203,213,225,.02) 100%);
      --rank3-bg:     linear-gradient(90deg,rgba(205,124,62,.10) 0%,rgba(205,124,62,.02) 100%);
      --nav-h:        68px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      direction: rtl;
    }

    /* ══════════════════════════════════════
       NAVBAR (consistent across all pages)
    ══════════════════════════════════════ */
    .site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(15,23,42,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
    }
    /* LOGO */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      margin-left: auto;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6, #60a5fa);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(59,130,246,.4);
      flex-shrink: 0;
    }
    .logo-mark svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-ar { font-family:'Cairo',sans-serif; font-size:1.05rem; font-weight:900; color:var(--text-primary); }
    .logo-en { font-family:'Orbitron',sans-serif; font-size:.5rem; font-weight:700; color:var(--blue-accent); letter-spacing:2.5px; text-transform:uppercase; }
    /* LINKS */
    .nav-links { display:flex; align-items:center; margin-right:auto; }
    .nav-links a { color:var(--text-muted); text-decoration:none; font-size:.9rem; font-weight:600; padding:8px 18px; border-bottom:3px solid transparent; transition:.2s; height:var(--nav-h); display:flex; align-items:center; }
    .nav-links a:hover, .nav-links a.active { color:var(--blue-accent); border-bottom-color:var(--blue-accent); background:rgba(59,130,246,.06); }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; margin-right:auto; background:none; border:none; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--text-primary); border-radius:2px; }

    /* ══════════════════════════════════════
       PAGE HEADER BAND (below fixed nav)
    ══════════════════════════════════════ */
    .site-header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      margin-top: var(--nav-h);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px 20px;
      text-align: center;
    }
    .league-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 3.5vw, 1.9rem);
      font-weight: 900;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #60a5fa, #f1f5f9, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .league-subtitle { font-size:.85rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
    .live-badge {
      display: inline-flex;
      align-items: center; gap: 6px;
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.4);
      color: var(--live-green);
      font-size: .7rem; font-weight: 700;
      letter-spacing: 2px; padding: 3px 10px;
      border-radius: 20px; margin-top: 10px; text-transform: uppercase;
    }
    .live-badge::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--live-green); animation:pulse 1.4s infinite; }

    /* ══════════════════════════════════════
       MAIN CONTENT
    ══════════════════════════════════════ */
    .main-content { max-width:1200px; margin:0 auto; padding:32px 16px 60px; }

    /* Section heading */
    .section-heading { display:flex; align-items:center; gap:14px; margin-bottom:20px; margin-top:44px; }
    .section-heading:first-of-type { margin-top:0; }
    .section-icon { width:42px; height:42px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.25rem; }
    .icon-teams   { background:linear-gradient(135deg,#1d4ed8,#3b82f6); }
    .icon-players { background:linear-gradient(135deg,#7c3aed,#a78bfa); }
    .section-title { font-size:1.3rem; font-weight:900; color:var(--text-primary); }
    .section-title small { display:block; font-size:.75rem; font-weight:400; color:var(--text-muted); margin-top:1px; }

    /* ══════════════════════════════════════
       TABLE
    ══════════════════════════════════════ */
    .table-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 4px 30px rgba(0,0,0,.4); }
    table { width:100%; border-collapse:collapse; font-size:.88rem; }
    thead tr { background:linear-gradient(90deg,#1d4ed8,#2563eb); }
    thead th { padding:13px 10px; text-align:center; font-weight:700; font-size:.78rem; letter-spacing:.4px; color:#e0eaff; white-space:nowrap; }
    tbody tr { border-bottom:1px solid rgba(51,65,85,.6); transition:background .18s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--row-hover); }
    tbody tr.rank-1 { background:var(--rank1-bg); }
    tbody tr.rank-2 { background:var(--rank2-bg); }
    tbody tr.rank-3 { background:var(--rank3-bg); }
    tbody tr.rank-1:hover { background:linear-gradient(90deg,rgba(251,191,36,.18),rgba(251,191,36,.06)); }
    tbody tr.rank-2:hover { background:linear-gradient(90deg,rgba(203,213,225,.15),rgba(203,213,225,.05)); }
    tbody tr.rank-3:hover { background:linear-gradient(90deg,rgba(205,124,62,.16),rgba(205,124,62,.05)); }
    tbody td { padding:12px 10px; text-align:center; vertical-align:middle; }

    /* RANK BADGE */
    .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; font-weight:900; font-size:.85rem; }
    .rank-badge.gold   { background:linear-gradient(135deg,#fbbf24,#f59e0b); color:#78350f; }
    .rank-badge.silver { background:linear-gradient(135deg,#e2e8f0,#94a3b8); color:#1e293b; }
    .rank-badge.bronze { background:linear-gradient(135deg,#cd7c3e,#92400e); color:#fef3c7; }
    .rank-badge.other  { background:rgba(51,65,85,.8); color:var(--text-muted); }

    /* CELL TYPES */
    .team-name { font-weight:700; font-size:.92rem; display:flex; align-items:center; justify-content:center; gap:8px; }
    .team-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .pts-total { font-weight:900; font-size:1rem; color:var(--blue-accent); }
    .pts-match { font-weight:700; color:var(--text-primary); }
    .pts-bonus { font-weight:700; color:var(--gold); }
    .gd-pos { color:#4ade80; font-weight:700; }
    .gd-neg { color:#f87171; font-weight:700; }
    .gd-zer { color:var(--text-muted); }
    .player-pts { font-weight:900; font-size:1rem; color:#a78bfa; }
    .team-pill { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.75rem; font-weight:700; background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.25); color:#93c5fd; }

    /* STATES */
    .state-box { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .state-box .icon { font-size:2.5rem; margin-bottom:12px; }
    .spinner { width:44px; height:44px; border:3px solid rgba(59,130,246,.2); border-top-color:var(--blue-accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }

    /* META */
    .meta-footer { margin-top:40px; display:flex; flex-wrap:wrap; gap:16px; justify-content:center; }
    .meta-chip { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:10px 20px; font-size:.82rem; color:var(--text-muted); display:flex; align-items:center; gap:8px; }
    .meta-chip span { color:var(--text-primary); font-weight:700; }

    /* ANIMATIONS */
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
    @keyframes spin  { to { transform:rotate(360deg); } }

    /* RESPONSIVE */
    @media (max-width:900px) { .hide-md { display:none !important; } }
    @media (max-width:600px) {
      thead th, tbody td { padding:9px 6px; font-size:.74rem; }
      .league-title { font-size:1rem; }
      .section-title { font-size:1.1rem; }
      .hide-sm { display:none !important; }
      .rank-badge { width:26px; height:26px; font-size:.72rem; }
    }
    @media (max-width:768px) {
      .nav-links { display:none; flex-direction:column; position:fixed; top:var(--nav-h); left:0; right:0; background:rgba(15,23,42,.97); border-bottom:1px solid var(--border); padding:10px 16px 18px; z-index:999; }
      .nav-links.open { display:flex; }
      .nav-links a { height:auto; padding:11px 14px; border-bottom:none; border-radius:8px; width:100%; }
      .nav-links a.active { background:rgba(59,130,246,.12); }
      .hamburger { display:flex; }
    }
  </style>
</head>
<body>

<!-- ════════════ NAVBAR ════════════ -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M6 2h12v6a6 6 0 01-12 0V2z"/><path d="M6 4H3a2 2 0 000 4h3"/><path d="M18 4h3a2 2 0 010 4h-3"/><path d="M12 14v4"/><path d="M8 22h8"/><path d="M9 18h6"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-ar">الحمله</span>
        <span class="logo-en">El7amla · 2v2 Fantasy</span>
      </div>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">🏠 الرئيسية</a>
      <a href="teams.html">👥 الفرق</a>
      <a href="standings.html" class="active">📊 الترتيب</a>
      <a href="fixtures.html">📅 المباريات</a>
    </div>
    <button class="hamburger" onclick="document.getElementById('nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- ════════════ HEADER BAND ════════════ -->
<header class="site-header">
  <div class="header-inner">
    <div class="league-title">El7amla 2v2 Fantasy League 2025/26</div>
    <div class="league-subtitle">Season Rankings</div>
    <div class="live-badge">مباشر</div>
  </div>
</header>

<!-- ════════════ MAIN ════════════ -->
<main class="main-content">

  <!-- Teams -->
  <div class="section-heading">
    <div class="section-icon icon-teams">🏆</div>
    <div class="section-title">ترتيب الفرق <small>Team Standings</small></div>
  </div>
  <div class="table-wrap" id="teams-wrap">
    <div class="state-box"><div class="spinner"></div><p>جارٍ تحميل البيانات…</p></div>
  </div>

  <!-- Players -->
  <div class="section-heading">
    <div class="section-icon icon-players">⚡</div>
    <div class="section-title">ترتيب اللاعبين <small>Player Rankings</small></div>
  </div>
  <div class="table-wrap" id="players-wrap">
    <div class="state-box"><div class="spinner"></div><p>جارٍ تحميل البيانات…</p></div>
  </div>

  <!-- Meta -->
  <div class="meta-footer" id="meta-footer" style="display:none">
    <div class="meta-chip">📅 آخر تحديث: <span id="meta-updated">—</span></div>
    <div class="meta-chip">🗓️ الجولة الحالية: <span id="meta-gw">—</span></div>
  </div>

</main>

<script>
  const TEAM_COLORS = {
    'Falcons':      '#3b82f6',
    'Smokers':      '#22c55e',
    'Black Tech':   '#a855f7',
    'Boys':         '#f97316',
    'The Pharaohs': '#eab308',
  };

  function rankBadge(rank) {
    const map = { 1:['gold','🥇'], 2:['silver','🥈'], 3:['bronze','🥉'] };
    if (map[rank]) { const [c,i] = map[rank]; return `<span class="rank-badge ${c}">${i}</span>`; }
    return `<span class="rank-badge other">${rank}</span>`;
  }

  function gdCell(val) {
    if (val == null) return '—';
    if (val > 0)  return `<span class="gd-pos">+${val}</span>`;
    if (val < 0)  return `<span class="gd-neg">${val}</span>`;
    return `<span class="gd-zer">0</span>`;
  }

  function buildTeamsTable(teams) {
    if (!teams?.length)
      return `<div class="state-box"><div class="icon">📭</div><p>لا توجد بيانات فرق متاحة</p></div>`;

    const rows = teams.map((t, i) => {
      const rank  = i + 1;
      const cls   = rank <= 3 ? `rank-${rank}` : '';
      const color = TEAM_COLORS[t.name] || '#64748b';
      const gd    = t.gd !== undefined ? t.gd : (t.gf != null && t.ga != null ? t.gf - t.ga : null);
      return `
        <tr class="${cls}">
          <td>${rankBadge(rank)}</td>
          <td><div class="team-name"><span class="team-dot" style="background:${color}"></span>${t.name}</div></td>
          <td class="hide-sm">${t.played}</td>
          <td class="hide-sm">${t.won}</td>
          <td class="hide-sm">${t.draw}</td>
          <td class="hide-sm">${t.lost}</td>
          <td class="hide-md">${t.gf ?? '—'}</td>
          <td class="hide-md">${t.ga ?? '—'}</td>
          <td class="hide-md">${gdCell(gd)}</td>
          <td><span class="pts-match">${t.matchPts}</span></td>
          <td><span class="pts-bonus">${t.bonus}</span></td>
          <td><span class="pts-total">${t.total}</span></td>
        </tr>`;
    }).join('');

    return `<table>
      <thead><tr>
        <th>المركز</th><th>الفريق</th>
        <th class="hide-sm">لعب</th><th class="hide-sm">فوز</th>
        <th class="hide-sm">تعادل</th><th class="hide-sm">خسارة</th>
        <th class="hide-md">له</th><th class="hide-md">عليه</th>
        <th class="hide-md">الفارق</th>
        <th>نقاط الماتشات</th><th>بونص</th><th>الإجمالي</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function buildPlayersTable(players) {
    if (!players?.length)
      return `<div class="state-box"><div class="icon">📭</div><p>لا توجد بيانات لاعبين متاحة</p></div>`;

    const rows = players.map((p, i) => {
      const rank  = i + 1;
      const cls   = rank <= 3 ? `rank-${rank}` : '';
      const color = TEAM_COLORS[p.team] || '#64748b';
      return `
        <tr class="${cls}">
          <td>${rankBadge(rank)}</td>
          <td style="font-weight:800">${p.name}</td>
          <td><span class="team-pill" style="border-color:${color}55;color:${color}">${p.team}</span></td>
          <td><span class="player-pts">${p.points.toLocaleString()}</span></td>
        </tr>`;
    }).join('');

    return `<table>
      <thead><tr>
        <th>المركز</th><th>اللاعب</th><th>الفريق</th><th>النقاط</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function showError(id, msg) {
    document.getElementById(id).innerHTML =
      `<div class="state-box"><div class="icon">⚠️</div><p>${msg}</p></div>`;
  }

  async function loadStandings() {
    const url = `https://raw.githubusercontent.com/El7amla/El7amla_WebSite/main/data/current_standings.json?v=${Date.now()}`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      document.getElementById('teams-wrap').innerHTML   = buildTeamsTable(data.teams);
      document.getElementById('players-wrap').innerHTML = buildPlayersTable(data.players);
      if (data.last_updated || data.current_gw) {
        document.getElementById('meta-updated').textContent  = data.last_updated || '—';
        document.getElementById('meta-gw').textContent       = data.current_gw   || '—';
        document.getElementById('meta-footer').style.display = 'flex';
      }
    } catch (err) {
      console.error(err);
      showError('teams-wrap',   'فشل تحميل البيانات. يرجى المحاولة مجدداً.');
      showError('players-wrap', 'فشل تحميل البيانات. يرجى المحاولة مجدداً.');
    }
  }

  loadStandings();
</script>
</body>
</html>
