<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الرئيسية - El7amla Fantasy League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:   #0f172a;
      --bg-card:      #1e293b;
      --bg-card2:     #162032;
      --border:       #334155;
      --text-primary: #f1f5f9;
      --text-muted:   #94a3b8;
      --blue-accent:  #3b82f6;
      --blue-dark:    #1d4ed8;
      --gold:         #fbbf24;
      --silver:       #cbd5e1;
      --bronze:       #cd7c3e;
      --green:        #22c55e;
      --red:          #ef4444;
      --purple:       #a855f7;
      --nav-h:        68px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      direction: rtl;
    }

    /* ══════════════════════════════════════
       SHARED NAVBAR (same across all pages)
    ══════════════════════════════════════ */
    .site-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(15,23,42,.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      display: flex;
      align-items: center;
      padding: 0 20px;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* ── LOGO ── */
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      text-decoration: none;
      margin-left: auto; /* RTL: pushes to right side */
      flex-shrink: 0;
    }
    .logo-mark {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(59,130,246,.4), 0 2px 8px rgba(0,0,0,.4);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-mark::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: linear-gradient(45deg, transparent 40%, rgba(255,255,255,.12) 50%, transparent 60%);
    }
    .logo-mark svg {
      width: 26px; height: 26px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }
    .logo-ar {
      font-family: 'Cairo', sans-serif;
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--text-primary);
      letter-spacing: .5px;
    }
    .logo-en {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.5rem;
      font-weight: 700;
      color: var(--blue-accent);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* ── NAV LINKS ── */
    .nav-links {
      display: flex;
      align-items: center;
      margin-right: auto; /* RTL: left side */
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 8px 18px;
      border-bottom: 3px solid transparent;
      transition: color .2s, background .2s, border-color .2s;
      height: var(--nav-h);
      display: flex;
      align-items: center;
    }
    .nav-links a:hover,
    .nav-links a.active {
      color: var(--blue-accent);
      border-bottom-color: var(--blue-accent);
      background: rgba(59,130,246,.06);
    }

    /* ── HAMBURGER ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      margin-right: auto;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--text-primary);
      border-radius: 2px;
      transition: .2s;
    }

    /* ══════════════════════════════════════
       PAGE CONTENT
    ══════════════════════════════════════ */
    .page-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(var(--nav-h) + 28px) 16px 60px;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding-bottom: 28px;
    }
    .hero-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.3rem, 4vw, 2.2rem);
      font-weight: 900;
      background: linear-gradient(90deg, #60a5fa, #f1f5f9, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,.15);
      border: 1px solid rgba(34,197,94,.4);
      color: var(--green);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 3px 12px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .live-badge::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.4s infinite;
    }

    /* ── GW NAV ── */
    .gw-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .gw-arrow {
      width: 38px; height: 38px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: .2s;
    }
    .gw-arrow:hover:not(:disabled) { border-color: var(--blue-accent); color: var(--blue-accent); }
    .gw-arrow:disabled { opacity: .3; cursor: not-allowed; }
    .gw-pill {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px 24px;
      min-width: 140px;
      text-align: center;
    }

    /* ── THREE-COL GRID ── */
    .home-grid {
      display: grid;
      grid-template-columns: 270px 1fr 270px;
      gap: 20px;
      align-items: start;
    }

    /* ══════════════════════════════════════
       SIDEBAR CARDS
    ══════════════════════════════════════ */
    .side-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }
    .side-card-hdr {
      padding: 13px 16px;
      font-weight: 800;
      font-size: 0.88rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .side-card-body { padding: 18px; }

    /* Best team */
    .bteam-badge { font-size: 3rem; text-align: center; margin-bottom: 8px; }
    .bteam-name  { text-align: center; font-size: 1.1rem; font-weight: 900; margin-bottom: 4px; }
    .bteam-rank  { text-align: center; margin-bottom: 14px; }
    .bteam-stat  {
      display: flex; justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(51,65,85,.5);
      font-size: 0.82rem;
    }
    .bteam-stat:last-child { border-bottom: none; }
    .bteam-stat .val { font-weight: 800; color: var(--blue-accent); }

    /* Best player */
    .bplayer-pts {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.4rem; font-weight: 900;
      color: var(--purple);
      text-align: center;
      line-height: 1;
    }
    .bplayer-sub { text-align: center; font-size: 0.72rem; color: var(--text-muted); margin: 4px 0 10px; }
    .bplayer-name { text-align: center; font-size: 1.1rem; font-weight: 900; margin-bottom: 6px; }
    .bplayer-team { text-align: center; margin-bottom: 14px; }

    /* rank badge */
    .rank-badge {
      display: inline-flex;
      align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px;
      font-weight: 900; font-size: 0.85rem;
    }
    .rank-badge.gold   { background: linear-gradient(135deg,#fbbf24,#f59e0b); color:#78350f; }

    /* team pill */
    .team-pill {
      display: inline-block;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.76rem;
      font-weight: 700;
      background: rgba(59,130,246,.12);
      border: 1px solid rgba(59,130,246,.25);
      color: #93c5fd;
    }

    /* ══════════════════════════════════════
       MATCH CARDS
    ══════════════════════════════════════ */
    .match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 18px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.35);
      transition: border-color .2s, transform .2s;
    }
    .match-card:hover { border-color: var(--blue-accent); transform: translateY(-2px); }
    .match-card.bye   { opacity: .55; border-style: dashed; }

    .match-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }
    .match-team       { display: flex; flex-direction: column; align-items: center; gap: 7px; }
    .match-team.home  { align-items: flex-end; }
    .match-team.away  { align-items: flex-start; }

    .team-icon {
      width: 54px; height: 54px;
      border-radius: 12px;
      background: var(--bg-primary);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      transition: border-color .2s;
    }
    .match-card:hover .team-icon { border-color: var(--blue-accent); }
    .match-team-name { font-weight: 800; font-size: 0.9rem; text-align: center; }
    .match-team-pts  {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .match-winner { font-size: 0.65rem; font-weight: 700; color: var(--gold); }

    .score-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .score-nums {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.9rem; font-weight: 900;
      letter-spacing: 4px;
    }
    .score-tag {
      font-size: 0.66rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      padding: 2px 9px; border-radius: 10px;
    }
    .score-tag.done { background: rgba(34,197,94,.15); color: var(--green); }
    .score-tag.live { background: rgba(251,191,36,.15); color: var(--gold); animation: pulse 1.4s infinite; }
    .score-tag.soon { background: rgba(59,130,246,.15); color: var(--blue-accent); }
    .score-tag.bye  { background: rgba(100,116,139,.15); color: var(--text-muted); }

    /* bye full-week */
    .full-bye-card {
      background: var(--bg-card);
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 48px 20px;
      text-align: center;
      color: var(--text-muted);
    }
    .full-bye-card .bi { font-size: 2.5rem; margin-bottom: 12px; }

    /* ══════════════════════════════════════
       STATE / SPINNER
    ══════════════════════════════════════ */
    .state-box { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(59,130,246,.2);
      border-top-color: var(--blue-accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 14px;
    }

    /* META */
    .meta-footer {
      margin-top: 40px;
      display: flex; flex-wrap: wrap;
      gap: 14px; justify-content: center;
    }
    .meta-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 0.81rem;
      color: var(--text-muted);
      display: flex; align-items: center; gap: 7px;
    }
    .meta-chip span { color: var(--text-primary); font-weight: 700; }

    /* ══════════════════════════════════════
       ANIMATIONS
    ══════════════════════════════════════ */
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
    @keyframes spin  { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .3s ease forwards; }

    /* ══════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════ */
    @media (max-width: 1024px) {
      .home-grid { grid-template-columns: 1fr; }
      .sidebar-right { order: -1; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; flex-direction: column; position: fixed; top: var(--nav-h); left:0; right:0; background: rgba(15,23,42,.97); border-bottom: 1px solid var(--border); padding: 10px 16px 18px; z-index: 999; }
      .nav-links.open { display: flex; }
      .nav-links a { height: auto; padding: 11px 14px; border-bottom: none; border-radius: 8px; width: 100%; }
      .nav-links a.active { background: rgba(59,130,246,.12); }
      .hamburger { display: flex; }
      .logo-text .logo-en { display: none; }
    }
    @media (max-width: 480px) {
      .score-nums { font-size: 1.4rem; letter-spacing: 2px; }
      .team-icon  { width: 44px; height: 44px; font-size: 1.6rem; }
      .gw-pill    { min-width: 110px; font-size: 0.82rem; }
    }
  </style>
</head>

<!-- ══════════════ NAVBAR ══════════════ -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">
        <!-- Trophy icon -->
        <svg viewBox="0 0 24 24"><path d="M6 2h12v6a6 6 0 01-12 0V2z"/><path d="M6 4H3a2 2 0 000 4h3"/><path d="M18 4h3a2 2 0 010 4h-3"/><path d="M12 14v4"/><path d="M8 22h8"/><path d="M9 18h6"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-ar">الحمله</span>

      </div>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html" class="active">🏠 الرئيسية</a>
      <a href="teams.html">👥 الفرق</a>
      <a href="standings.html">📊 الترتيب</a>
      <a href="fixtures.html">📅 المباريات</a>
    </div>
    <button class="hamburger" id="ham" onclick="document.getElementById('nav-links').classList.toggle('open')" aria-label="القائمة">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- ══════════════ PAGE ══════════════ -->
<div class="page-wrap">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-title">El7amla 2v2 Fantasy League</div>
    <div class="hero-sub">الموسم 2025 / 26</div>
    <div class="live-badge">مباشر</div>
  </div>

  <!-- GW Navigation -->
  <div class="gw-nav">
    <button class="gw-arrow" id="btn-prev" onclick="changeGW(-1)" disabled>&#8594;</button>
    <div class="gw-pill" id="gw-label">الجولة —</div>
    <button class="gw-arrow" id="btn-next" onclick="changeGW(+1)" disabled>&#8592;</button>
  </div>

  <!-- Main Grid -->
  <div class="home-grid">

    <!-- LEFT: Best Team -->
    <div class="side-card" id="card-best-team">
      <div class="side-card-hdr" style="background:linear-gradient(90deg,#1d4ed8,#2563eb)">
        🏆 أفضل فريق
      </div>
      <div class="side-card-body">
        <div class="state-box"><div class="spinner"></div><p>جارٍ التحميل…</p></div>
      </div>
    </div>

    <!-- CENTER: Matches -->
    <div id="matches-wrap">
      <div class="state-box"><div class="spinner"></div><p>جارٍ تحميل المباريات…</p></div>
    </div>

    <!-- RIGHT: Best Player -->
    <div class="side-card sidebar-right" id="card-best-player">
      <div class="side-card-hdr" style="background:linear-gradient(90deg,#7c3aed,#9333ea)">
        ⚡ أفضل لاعب
      </div>
      <div class="side-card-body">
        <div class="state-box"><div class="spinner"></div><p>جارٍ التحميل…</p></div>
      </div>
    </div>

  </div>

  <!-- Meta -->
  <div class="meta-footer" id="meta-footer" style="display:none">
    <div class="meta-chip">🗓️ الجولة الحالية: <span id="meta-gw">—</span></div>
    <div class="meta-chip">📅 آخر تحديث: <span id="meta-updated">—</span></div>
  </div>

</div><!-- /page-wrap -->

<script>
/* ═══════ CONFIG ═══════ */
const RAW = "https://raw.githubusercontent.com/El7amla/El7amla_WebSite/main";
const TEAM_META = {
  "Falcons":      { color:"#3b82f6", em:"🦅" },
  "Smokers":      { color:"#22c55e", em:"💨" },
  "Black Tech":   { color:"#a855f7", em:"💻" },
  "Boys":         { color:"#f97316", em:"⚽" },
  "The Pharaohs": { color:"#eab308", em:"🏺" },
};

/* ═══════ STATE ═══════ */
let standingsData = null;
let fixturesData  = null;
let currentGW = 1;   // latest finished GW
let viewGW    = 1;   // GW currently displayed

/* ═══════ INIT ═══════ */
async function init() {
  try {
    [standingsData, fixturesData] = await Promise.all([
      fetch(`${RAW}/data/current_standings.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`${RAW}/fixtures.json?v=${Date.now()}`).then(r => r.json()),
    ]);

    currentGW = standingsData.current_gw || 1;
    // Show next GW if current is done, otherwise show current
    viewGW = currentGW;

    document.getElementById('meta-gw').textContent      = currentGW;
    document.getElementById('meta-updated').textContent  = standingsData.last_updated || '—';
    document.getElementById('meta-footer').style.display = 'flex';

    renderSidebars();
    renderGW(viewGW);
  } catch(e) {
    document.getElementById('matches-wrap').innerHTML =
      `<div class="state-box"><div class="icon">⚠️</div><p>فشل تحميل البيانات</p></div>`;
  }
}

/* ═══════ GW CHANGE ═══════ */
function changeGW(delta) {
  const next = viewGW + delta;
  if (next < 1 || next > 38) return;
  viewGW = next;
  renderGW(viewGW);
}

function updateNavBtns() {
  document.getElementById('btn-prev').disabled = (viewGW <= 1);
  document.getElementById('btn-next').disabled = (viewGW >= 38);
  document.getElementById('gw-label').textContent = `الجولة ${viewGW}`;
}

/* ═══════ RENDER MATCHES ═══════ */
function renderGW(gw) {
  updateNavBtns();
  const wrap = document.getElementById('matches-wrap');
  const matchups = (fixturesData?.fixtures || {})[String(gw)] || [];

  /* Full-bye week */
  const allBye = matchups.every(m => m[0] === "BYE" && m[1] === "BYE");
  if (allBye) {
    wrap.innerHTML = `
      <div class="full-bye-card fade-up">
        <div class="bi">😴</div>
        <div style="font-weight:800;font-size:1rem;margin-bottom:6px">جولة راحة كاملة</div>
        <div style="font-size:0.85rem">لا توجد مباريات في هذه الجولة</div>
      </div>`;
    return;
  }

  const isPlayed  = gw < currentGW;
  const isCurrent = gw === currentGW;

  const html = matchups.map(m => {
    const [home, away] = m;

    /* One-team BYE */
    if (home === "BYE" || away === "BYE") {
      const team = home === "BYE" ? away : home;
      const meta = TEAM_META[team] || { em:"⚽", color:"#64748b" };
      return `
        <div class="match-card bye fade-up">
          <div class="match-row">
            <div class="match-team home">
              <div class="team-icon" style="border-color:${meta.color}">${meta.em}</div>
              <div class="match-team-name">${team}</div>
            </div>
            <div class="score-center">
              <div class="score-nums" style="font-size:1rem;color:var(--text-muted)">BYE</div>
              <div class="score-tag bye">راحة</div>
            </div>
            <div class="match-team away"></div>
          </div>
        </div>`;
    }

    const hMeta = TEAM_META[home] || { em:"⚽", color:"#64748b" };
    const aMeta = TEAM_META[away] || { em:"⚽", color:"#64748b" };

    /* Get per-GW points from standings gf field isn't per-GW,
       so we mark played/live/upcoming only */
    const tag = isPlayed
      ? `<div class="score-tag done">انتهت</div>`
      : isCurrent
        ? `<div class="score-tag live">جارية</div>`
        : `<div class="score-tag soon">قادمة</div>`;

    const scoreDisplay = `<div class="score-nums" style="color:var(--text-muted);font-size:1.3rem">VS</div>`;

    return `
      <div class="match-card fade-up">
        <div class="match-row">
          <div class="match-team home">
            <div class="team-icon" style="border-color:${hMeta.color}">${hMeta.em}</div>
            <div class="match-team-name">${home}</div>
          </div>
          <div class="score-center">
            ${scoreDisplay}
            ${tag}
          </div>
          <div class="match-team away">
            <div class="team-icon" style="border-color:${aMeta.color}">${aMeta.em}</div>
            <div class="match-team-name">${away}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  wrap.innerHTML = html || `<div class="state-box"><div class="icon">📭</div><p>لا توجد مباريات</p></div>`;
}

/* ═══════ RENDER SIDEBARS ═══════ */
function renderSidebars() {
  /* Best team = rank 1 */
  const team = standingsData?.teams?.[0];
  if (team) {
    const meta = TEAM_META[team.name] || { em:"⚽", color:"#64748b" };
    const gd   = team.gd ?? (team.gf - team.ga);
    document.getElementById('card-best-team').querySelector('.side-card-body').innerHTML = `
      <div class="bteam-badge">${meta.em}</div>
      <div class="bteam-name" style="color:${meta.color}">${team.name}</div>
      <div class="bteam-rank"><span class="rank-badge gold">🥇</span></div>
      <div class="bteam-stat"><span>الإجمالي</span>       <span class="val">${team.total}</span></div>
      <div class="bteam-stat"><span>نقاط الماتشات</span>  <span class="val">${team.matchPts}</span></div>
      <div class="bteam-stat"><span>البونص</span>          <span class="val" style="color:var(--gold)">${team.bonus}</span></div>
      <div class="bteam-stat"><span>فوز / خسارة</span>    <span class="val">${team.won} / ${team.lost}</span></div>
      <div class="bteam-stat"><span>فارق النقاط</span>    <span class="val" style="color:${gd>=0?'var(--green)':'var(--red)'}">${gd>0?'+':''}${gd}</span></div>`;
  }

  /* Best player = rank 1 in players array */
  const player = standingsData?.players?.[0];
  if (player) {
    const meta = TEAM_META[player.team] || { color:"#64748b" };
    document.getElementById('card-best-player').querySelector('.side-card-body').innerHTML = `
      <div class="bplayer-pts">${player.points.toLocaleString()}</div>
      <div class="bplayer-sub">نقطة في دوري الحمله</div>
      <div class="bplayer-name">⚡ ${player.name}</div>
      <div class="bplayer-team">
        <span class="team-pill" style="border-color:${meta.color}55;color:${meta.color}">${player.team}</span>
      </div>
      <div style="text-align:center;margin-top:12px">
        <span class="rank-badge gold" style="margin:0 auto">🥇</span>
        <div style="font-size:0.74rem;color:var(--text-muted);margin-top:6px">المركز الأول في الدوري</div>
      </div>`;
  }
}

init();
</script>
</body>
</html>
