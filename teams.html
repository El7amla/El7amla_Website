<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الفرق - El7amla Fantasy League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:   #0f172a;
      --bg-card:      #1e293b;
      --border:       #334155;
      --text-primary: #f1f5f9;
      --text-muted:   #94a3b8;
      --blue-accent:  #3b82f6;
      --blue-dark:    #1d4ed8;
      --gold:         #fbbf24;
      --green:        #22c55e;
      --red:          #ef4444;
      --purple:       #a855f7;
      --nav-h:        68px;
      --row-hover:    rgba(59,130,246,.08);
      --rank1-bg:     linear-gradient(90deg,rgba(251,191,36,.12),rgba(251,191,36,.03));
      --rank2-bg:     linear-gradient(90deg,rgba(203,213,225,.09),rgba(203,213,225,.02));
      --rank3-bg:     linear-gradient(90deg,rgba(205,124,62,.11),rgba(205,124,62,.02));
    }

    html { scroll-behavior: smooth; }
    body { font-family:'Cairo',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; direction:rtl; }

    /* ══ NAVBAR ══ */
    .site-nav { position:fixed; top:0; left:0; right:0; height:var(--nav-h); background:rgba(15,23,42,.96); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); z-index:1000; display:flex; align-items:center; padding:0 20px; }
    .nav-inner { max-width:1200px; margin:0 auto; width:100%; display:flex; align-items:center; }
    .nav-logo { display:flex; align-items:center; gap:11px; text-decoration:none; margin-left:auto; flex-shrink:0; }
    .logo-mark { width:44px; height:44px; background:linear-gradient(135deg,#1d4ed8,#3b82f6,#60a5fa); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 18px rgba(59,130,246,.4); flex-shrink:0; }
    .logo-mark svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-text { display:flex; flex-direction:column; line-height:1.1; }
    .logo-ar { font-family:'Cairo',sans-serif; font-size:1.05rem; font-weight:900; color:var(--text-primary); }
    .logo-en { font-family:'Orbitron',sans-serif; font-size:.5rem; font-weight:700; color:var(--blue-accent); letter-spacing:2.5px; text-transform:uppercase; }
    .nav-links { display:flex; align-items:center; margin-right:auto; }
    .nav-links a { color:var(--text-muted); text-decoration:none; font-size:.9rem; font-weight:600; padding:8px 18px; border-bottom:3px solid transparent; transition:.2s; height:var(--nav-h); display:flex; align-items:center; }
    .nav-links a:hover, .nav-links a.active { color:var(--blue-accent); border-bottom-color:var(--blue-accent); background:rgba(59,130,246,.06); }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; margin-right:auto; background:none; border:none; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--text-primary); border-radius:2px; }

    /* ══ PAGE ══ */
    .page-wrap { max-width:1200px; margin:0 auto; padding:calc(var(--nav-h) + 28px) 16px 60px; }
    .page-header { text-align:center; margin-bottom:28px; }
    .page-title { font-family:'Orbitron',sans-serif; font-size:clamp(1.1rem,3.5vw,1.9rem); font-weight:900; background:linear-gradient(90deg,#60a5fa,#f1f5f9,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
    .page-sub { font-size:.85rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }

    /* ══ TEAM SELECTOR CARDS ══ */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    .team-card {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .team-card:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.4); }
    .team-card.active { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,0,0,.5); }
    .team-card-em   { font-size: 2.2rem; }
    .team-card-name { font-weight: 800; font-size: .85rem; }
    .team-card-sub  { font-size: .7rem; color: var(--text-muted); }

    /* ══ SUMMARY ROW ══ */
    .summary-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .sum-chip {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }
    .sum-val { font-family:'Orbitron',sans-serif; font-size: 1.4rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
    .sum-lbl { font-size: .72rem; color: var(--text-muted); }

    /* ══ TABLE ══ */
    .section-heading { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
    .section-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
    .section-title { font-size:1.2rem; font-weight:900; }
    .section-title small { display:block; font-size:.73rem; font-weight:400; color:var(--text-muted); margin-top:1px; }

    .table-wrap { background:var(--bg-card); border:1px solid var(--border); border-radius:16px; overflow:hidden; box-shadow:0 4px 30px rgba(0,0,0,.4); }
    table { width:100%; border-collapse:collapse; font-size:.88rem; }
    thead tr { background:linear-gradient(90deg,#1d4ed8,#2563eb); }
    thead th { padding:13px 12px; text-align:center; font-weight:700; font-size:.78rem; letter-spacing:.4px; color:#e0eaff; white-space:nowrap; }
    tbody tr { border-bottom:1px solid rgba(51,65,85,.6); transition:background .18s; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:var(--row-hover); }
    tbody tr.win-row  { background:linear-gradient(90deg,rgba(34,197,94,.10),rgba(34,197,94,.02)); }
    tbody tr.draw-row { background:linear-gradient(90deg,rgba(251,191,36,.10),rgba(251,191,36,.02)); }
    tbody tr.loss-row { background:linear-gradient(90deg,rgba(239,68,68,.08),rgba(239,68,68,.02)); }
    tbody tr.bye-row  { opacity:.55; }
    tbody tr.win-row:hover  { background:linear-gradient(90deg,rgba(34,197,94,.17),rgba(34,197,94,.05)); }
    tbody tr.draw-row:hover { background:linear-gradient(90deg,rgba(251,191,36,.17),rgba(251,191,36,.05)); }
    tbody tr.loss-row:hover { background:linear-gradient(90deg,rgba(239,68,68,.14),rgba(239,68,68,.04)); }
    tbody td { padding:12px 12px; text-align:center; vertical-align:middle; }

    .gw-badge { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:8px; font-family:'Orbitron',sans-serif; font-size:.75rem; font-weight:700; background:rgba(51,65,85,.8); color:var(--text-muted); }

    .opp-cell { display:flex; align-items:center; justify-content:center; gap:7px; font-weight:700; font-size:.9rem; }
    .opp-em { font-size:1.1rem; }

    .pts-team { font-family:'Orbitron',sans-serif; font-size:.95rem; font-weight:900; }
    .pts-opp  { font-family:'Orbitron',sans-serif; font-size:.95rem; font-weight:700; color:var(--text-muted); }

    .result-badge {
      display:inline-flex; align-items:center; gap:5px;
      padding:3px 10px; border-radius:20px;
      font-size:.74rem; font-weight:800; letter-spacing:.5px;
    }
    .rb-win  { background:rgba(34,197,94,.15);  border:1px solid rgba(34,197,94,.35);  color:var(--green); }
    .rb-draw { background:rgba(251,191,36,.15);  border:1px solid rgba(251,191,36,.35);  color:var(--gold); }
    .rb-loss { background:rgba(239,68,68,.12);   border:1px solid rgba(239,68,68,.3);   color:var(--red); }
    .rb-bye  { background:rgba(100,116,139,.12); border:1px solid rgba(100,116,139,.3); color:var(--text-muted); }

    .mp-cell { font-weight:900; font-size:.95rem; }
    .mp-3 { color:var(--green); }
    .mp-1 { color:var(--gold); }
    .mp-0 { color:var(--text-muted); }

    .bonus-cell { font-weight:900; color:var(--gold); font-size:.9rem; }

    /* STATE */
    .state-box { text-align:center; padding:60px 20px; color:var(--text-muted); }
    .state-box .si { font-size:2.5rem; margin-bottom:12px; }
    .spinner { width:44px; height:44px; border:3px solid rgba(59,130,246,.2); border-top-color:var(--blue-accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* RESPONSIVE */
    @media (max-width:900px) {
      .teams-grid { grid-template-columns:repeat(3,1fr); }
      .summary-row { grid-template-columns:repeat(2,1fr); }
    }
    @media (max-width:600px) {
      .teams-grid { grid-template-columns:repeat(2,1fr); }
      .summary-row { grid-template-columns:repeat(2,1fr); }
      thead th, tbody td { padding:9px 6px; font-size:.74rem; }
      .hide-sm { display:none !important; }
    }
    @media (max-width:768px) {
      .nav-links { display:none; flex-direction:column; position:fixed; top:var(--nav-h); left:0; right:0; background:rgba(15,23,42,.97); border-bottom:1px solid var(--border); padding:10px 16px 18px; z-index:999; }
      .nav-links.open { display:flex; }
      .nav-links a { height:auto; padding:11px 14px; border-bottom:none; border-radius:8px; width:100%; }
      .nav-links a.active { background:rgba(59,130,246,.12); }
      .hamburger { display:flex; }
    }
  </style>
</head>

<script>
/* ══ CONFIG ══ */
const RAW = "https://raw.githubusercontent.com/El7amla/El7amla_WebSite/main";

const TEAM_META = {
  "Falcons":      { color:"#3b82f6", em:"🦅" },
  "Smokers":      { color:"#22c55e", em:"💨" },
  "Black Tech":   { color:"#a855f7", em:"💻" },
  "Boys":         { color:"#f97316", em:"⚽" },
  "The Pharaohs": { color:"#eab308", em:"🏺" },
};

const FIXTURES = {
  1:  [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  2:  [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  3:  [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  4:  [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  5:  [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  6:  [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  7:  [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  8:  [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  9:  [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  10: [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  11: [["BYE","BYE"]],
  12: [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  13: [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  14: [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  15: [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  16: [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  17: [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  18: [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  19: [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  20: [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  21: [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  22: [["BYE","BYE"]],
  23: [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  24: [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  25: [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  26: [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  27: [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  28: [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  29: [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  30: [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  31: [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  32: [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  33: [["Black Tech","The Pharaohs"],["Smokers","Falcons"],["Boys","BYE"]],
  34: [["Smokers","The Pharaohs"],["Black Tech","Boys"],["Falcons","BYE"]],
  35: [["Smokers","Black Tech"],["Falcons","Boys"],["The Pharaohs","BYE"]],
  36: [["Smokers","Boys"],["Falcons","The Pharaohs"],["Black Tech","BYE"]],
  37: [["Falcons","Black Tech"],["The Pharaohs","Boys"],["Smokers","BYE"]],
  38: [["BYE","BYE"]],
};

/* ══ STATE ══ */
let standingsData = null;
let selectedTeam  = null;
const TEAMS = Object.keys(TEAM_META);

/* ══ INIT ══ */
async function init() {
  try {
    standingsData = await fetch(`${RAW}/data/current_standings.json?v=${Date.now()}`).then(r => r.json());
    buildTeamCards();
  } catch(e) {
    document.getElementById('teams-grid').innerHTML =
      `<div class="state-box"><div class="si">⚠️</div><p>فشل تحميل البيانات</p></div>`;
  }
}

/* ══ BUILD TEAM SELECTOR CARDS ══ */
function buildTeamCards() {
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = TEAMS.map(name => {
    const meta  = TEAM_META[name];
    const tData = standingsData.teams.find(t => t.name === name);
    const rank  = standingsData.teams.findIndex(t => t.name === name) + 1;
    const rankEmoji = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `#${rank}`;
    return `
      <div class="team-card" id="tc-${name.replace(/\s/g,'_')}"
           onclick="selectTeam('${name}')"
           style="border-color:${meta.color}44">
        <div class="team-card-em">${meta.em}</div>
        <div class="team-card-name" style="color:${meta.color}">${name}</div>
        <div class="team-card-sub">${rankEmoji} · ${tData?.total ?? 0} نقطة</div>
      </div>`;
  }).join('');
}

/* ══ SELECT TEAM ══ */
function selectTeam(name) {
  /* Update active card */
  TEAMS.forEach(t => {
    const el = document.getElementById(`tc-${t.replace(/\s/g,'_')}`);
    if (!el) return;
    const meta = TEAM_META[t];
    if (t === name) {
      el.classList.add('active');
      el.style.borderColor = meta.color;
      el.style.background  = meta.color + '22';
      el.style.boxShadow   = `0 0 20px ${meta.color}44`;
    } else {
      el.classList.remove('active');
      el.style.borderColor = meta.color + '44';
      el.style.background  = '';
      el.style.boxShadow   = '';
    }
  });

  selectedTeam = name;
  renderTeamResults(name);
}

/* ══ RENDER RESULTS ══ */
function renderTeamResults(teamName) {
  const meta     = TEAM_META[teamName];
  const currentGW = standingsData.current_gw || 1;
  const allTeams  = TEAMS;

  /* ── compute bonus winner per GW from standings data ──
     We don't have per-GW raw data here in the HTML, so we derive
     bonus from standings.teams bonus field is aggregate.
     Instead we embed the per-GW bonus logic using the GW data
     from current_standings which the Python script writes.
     Since we only have aggregate bonus in standings, we show
     the match results without per-GW bonus breakdown,
     and show total bonus from standings at the end.

     For the match scores: standings has gf/ga as season totals,
     not per-GW. So we show what we CAN show from standings:
     the aggregate stats, and per-GW opponent from fixtures.
  ──────────────────────────────────────────────────────── */

  /* Get team stats from standings */
  const tData  = standingsData.teams.find(t => t.name === teamName) || {};
  const rank   = standingsData.teams.findIndex(t => t.name === teamName) + 1;

  /* Update icon and title */
  document.getElementById('tbl-icon').textContent  = meta.em;
  document.getElementById('tbl-icon').style.background = `linear-gradient(135deg,${meta.color}99,${meta.color})`;
  document.getElementById('tbl-title').innerHTML =
    `${teamName} — سجل المباريات <small>Match History · حتى الجولة ${currentGW}</small>`;

  /* ── Build match rows from fixtures ── */
  const tbody = document.getElementById('matches-tbody');

  let rows = '';
  let runningMP    = 0;
  let runningBonus = 0;
  let matchCount   = 0;
  let wins = 0, draws = 0, losses = 0;

  /* We need per-GW scores. Since the Python script saves gf/ga as season totals
     we reconstruct match results from the fixtures + standings match counts.
     For score display we'll show "—" for points and derive W/D/L from
     the fixture list up to currentGW using only what we have.

     The REAL per-GW points are in the gw JSON files which the script processes.
     The script stores per-GW data in current_standings only as aggregates.
     So for this page we fetch current_standings which has:
       won, draw, lost, matchPts, bonus, total, gf, ga, gd
     We can show the fixture schedule with results coded as W/D/L
     IF we had per-GW data. Since we only have aggregates here,
     we'll show the schedule and mark played GWs — for actual scores
     we'd need a gw_history.json. Let's build the table with what we have
     and show per-GW scores as "—" with honest labeling.

     However — we DO have the GW json files on GitHub.
     Let's fetch them! */

  document.getElementById('results-section').style.display = 'block';
  tbody.innerHTML = `<tr><td colspan="8" style="padding:30px;text-align:center;color:var(--text-muted)"><div class="spinner" style="margin:0 auto 10px"></div>جارٍ تحميل نتائج الجولات…</td></tr>`;

  /* Update summary with loading */
  renderSummary(tData, rank, meta, null);

  /* Fetch GW data and build table */
  fetchAndRenderGWs(teamName, currentGW, meta, tData, rank);
}

async function fetchAndRenderGWs(teamName, currentGW, meta, tData, rank) {
  const tbody = document.getElementById('matches-tbody');

  try {
    /* Fetch all played GWs in parallel */
    const gwPromises = [];
    for (let gw = 1; gw <= currentGW; gw++) {
      gwPromises.push(
        fetch(`${RAW}/data/gw_history/gw${gw}.json?v=${Date.now()}`)
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      );
    }
    const gwResults = await Promise.all(gwPromises);

    /* Build bonus winner per GW */
    const bonusWinner = {};
    const allTeamNames = Object.keys(TEAM_META);

    for (let i = 0; i < gwResults.length; i++) {
      const gw   = i + 1;
      const data = gwResults[i];
      const matchups = FIXTURES[gw] || [];
      const allBye   = matchups.every(m => m[0]==="BYE" && m[1]==="BYE");
      if (allBye || !data) { bonusWinner[gw] = null; continue; }

      const scores = {};
      allTeamNames.forEach(t => {
        if (data[t]) scores[t] = Object.values(data[t]).reduce((s,p) => s + p.points, 0);
      });
      const mx  = Math.max(...Object.values(scores));
      const top = Object.keys(scores).filter(t => scores[t] === mx);
      bonusWinner[gw] = top.length === 1 ? top[0] : null;
    }

    /* Build rows */
    let rows = '';
    let runMP = 0, runBonus = 0, wins = 0, draws = 0, losses = 0;

    for (let i = 0; i < gwResults.length; i++) {
      const gw      = i + 1;
      const data    = gwResults[i];
      const matchups = FIXTURES[gw] || [];
      const allBye   = matchups.every(m => m[0]==="BYE" && m[1]==="BYE");

      /* Full bye week */
      if (allBye) {
        rows += `
          <tr class="bye-row">
            <td><span class="gw-badge">${gw}</span></td>
            <td colspan="6" style="color:var(--text-muted);font-size:.82rem">😴 جولة راحة كاملة</td>
            <td>—</td>
          </tr>`;
        continue;
      }

      /* Find team's fixture this GW */
      const myFix = matchups.find(m => m.includes(teamName));

      /* Team BYE */
      if (!myFix || myFix.includes("BYE")) {
        const gotBonus = bonusWinner[gw] === teamName;
        if (gotBonus) runBonus++;
        rows += `
          <tr class="bye-row">
            <td><span class="gw-badge">${gw}</span></td>
            <td style="color:var(--text-muted);font-size:.82rem">— استراحة —</td>
            <td class="hide-sm">—</td>
            <td class="hide-sm">—</td>
            <td><span class="result-badge rb-bye">BYE</span></td>
            <td class="mp-0">—</td>
            <td>${gotBonus ? '<span class="bonus-cell">⭐ +1</span>' : '—'}</td>
            <td style="color:var(--text-muted)">${runMP + runBonus}</td>
          </tr>`;
        continue;
      }

      /* Real match */
      const opp = myFix[0] === teamName ? myFix[1] : myFix[0];
      const oppMeta = TEAM_META[opp] || { em:'⚽', color:'#64748b' };

      let myPts = null, oppPts = null;
      if (data && data[teamName] && data[opp]) {
        myPts  = Object.values(data[teamName]).reduce((s,p) => s + p.points, 0);
        oppPts = Object.values(data[opp]).reduce((s,p) => s + p.points, 0);
      }

      let resultClass = '', resultBadge = '', mp = 0;
      if (myPts !== null && oppPts !== null) {
        if (myPts > oppPts)       { resultClass='win-row';  resultBadge=`<span class="result-badge rb-win">فوز ✅</span>`;  mp=3; wins++; }
        else if (myPts === oppPts){ resultClass='draw-row'; resultBadge=`<span class="result-badge rb-draw">تعادل 🟡</span>`; mp=1; draws++; }
        else                       { resultClass='loss-row'; resultBadge=`<span class="result-badge rb-loss">خسارة ❌</span>`; mp=0; losses++; }
      } else {
        resultBadge = `<span class="result-badge rb-bye" style="opacity:.6">لم تُلعب</span>`;
      }

      runMP += mp;
      const gotBonus = bonusWinner[gw] === teamName;
      if (gotBonus) runBonus++;

      const myPtsDisp  = myPts  !== null ? `<span class="pts-team" style="color:${meta.color}">${myPts}</span>`  : '—';
      const oppPtsDisp = oppPts !== null ? `<span class="pts-opp">${oppPts}</span>` : '—';
      const mpCls      = mp===3?'mp-3':mp===1?'mp-1':'mp-0';

      rows += `
        <tr class="${resultClass}">
          <td><span class="gw-badge">${gw}</span></td>
          <td>
            <div class="opp-cell">
              <span class="opp-em">${oppMeta.em}</span>
              <span style="color:${oppMeta.color};font-weight:800">${opp}</span>
            </div>
          </td>
          <td class="hide-sm">${myPtsDisp}</td>
          <td class="hide-sm">${oppPtsDisp}</td>
          <td>${resultBadge}</td>
          <td class="${mpCls} mp-cell">+${mp}</td>
          <td>${gotBonus ? '<span class="bonus-cell">⭐ +1</span>' : '—'}</td>
          <td style="font-weight:800;color:var(--blue-accent)">${runMP + runBonus}</td>
        </tr>`;
    }

    tbody.innerHTML = rows || `<tr><td colspan="8" style="padding:30px;text-align:center;color:var(--text-muted)">لا توجد بيانات</td></tr>`;
    renderSummary(tData, rank, meta, { wins, draws, losses, runMP, runBonus });

  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="8" style="padding:30px;text-align:center;color:var(--red)">⚠️ فشل تحميل بيانات الجولات</td></tr>`;
  }
}

function renderSummary(tData, rank, meta, computed) {
  const rankEmoji = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`#${rank}`;
  const w = computed?.wins    ?? tData.won   ?? '—';
  const d = computed?.draws   ?? tData.draw  ?? '—';
  const l = computed?.losses  ?? tData.lost  ?? '—';
  const mp    = computed?.runMP    ?? tData.matchPts ?? '—';
  const bonus = computed?.runBonus ?? tData.bonus    ?? '—';
  const total = (typeof mp==='number' && typeof bonus==='number') ? mp+bonus : tData.total ?? '—';

  document.getElementById('summary-row').innerHTML = `
    <div class="sum-chip" style="border-color:${meta.color}55">
      <div class="sum-val" style="color:${meta.color}">${rankEmoji}</div>
      <div class="sum-lbl">المركز في الدوري</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--green)">${w}</div>
      <div class="sum-lbl">فوز</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--gold)">${d}</div>
      <div class="sum-lbl">تعادل</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--red)">${l}</div>
      <div class="sum-lbl">خسارة</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--blue-accent)">${mp}</div>
      <div class="sum-lbl">نقاط الماتشات</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--gold)">${bonus}</div>
      <div class="sum-lbl">البونص</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--blue-accent)">${total}</div>
      <div class="sum-lbl">المجموع الكلي</div>
    </div>
    <div class="sum-chip">
      <div class="sum-val" style="color:var(--text-muted)">${tData.gd > 0 ? '+' : ''}${tData.gd ?? '—'}</div>
      <div class="sum-lbl">فارق النقاط</div>
    </div>`;
}

init();
</script>
