name: Update Standings

on:
  # Run daily at 23:00 UTC (1 AM Cairo time)
  schedule:
    - cron: "0 23 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push current_standings.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run standings updater
        run: python scripts/update_standings.py

      - name: Commit and push updated standings
        run: |
          git config user.name  "El7amla Bot"
          git config user.email "bot@el7amla.local"
          git add data/current_standings.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "Auto-update standings [skip ci]"
          git push
