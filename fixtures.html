<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المباريات - El7amla Fantasy League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg-primary:#0f172a; --bg-card:#1e293b; --border:#334155;
      --text-primary:#f1f5f9; --text-muted:#94a3b8;
      --blue-accent:#3b82f6; --blue-dark:#1d4ed8;
      --gold:#fbbf24; --green:#22c55e; --red:#ef4444; --nav-h:68px;
    }
    html { scroll-behavior:smooth; }
    body { font-family:'Cairo',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; direction:rtl; }

    /* NAVBAR */
    .site-nav { position:fixed; top:0; left:0; right:0; height:var(--nav-h); background:rgba(15,23,42,.96); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); z-index:1000; display:flex; align-items:center; padding:0 20px; }
    .nav-inner { max-width:1200px; margin:0 auto; width:100%; display:flex; align-items:center; }
    .nav-logo { display:flex; align-items:center; gap:11px; text-decoration:none; margin-left:auto; flex-shrink:0; }
    .logo-mark { width:44px; height:44px; background:linear-gradient(135deg,#1d4ed8,#3b82f6,#60a5fa); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 18px rgba(59,130,246,.4); flex-shrink:0; }
    .logo-mark svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .logo-text { display:flex; flex-direction:column; line-height:1.1; }
    .logo-ar { font-family:'Cairo',sans-serif; font-size:1.05rem; font-weight:900; color:var(--text-primary); }
    .logo-en { font-family:'Orbitron',sans-serif; font-size:.5rem; font-weight:700; color:var(--blue-accent); letter-spacing:2.5px; text-transform:uppercase; }
    .nav-links { display:flex; align-items:center; margin-right:auto; }
    .nav-links a { color:var(--text-muted); text-decoration:none; font-size:.9rem; font-weight:600; padding:8px 18px; border-bottom:3px solid transparent; transition:.2s; height:var(--nav-h); display:flex; align-items:center; }
    .nav-links a:hover, .nav-links a.active { color:var(--blue-accent); border-bottom-color:var(--blue-accent); background:rgba(59,130,246,.06); }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:4px; margin-right:auto; background:none; border:none; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--text-primary); border-radius:2px; }

    /* PAGE */
    .page-wrap { max-width:1200px; margin:0 auto; padding:calc(var(--nav-h)+28px) 16px 60px; }
    .page-header { text-align:center; margin-bottom:28px; }
    .page-title { font-family:'Orbitron',sans-serif; font-size:clamp(1.1rem,3.5vw,1.9rem); font-weight:900; background:linear-gradient(90deg,#60a5fa,#f1f5f9,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:4px; }
    .page-sub { font-size:.85rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }

    /* GW GRID */
    .gw-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(56px,1fr));
      gap:7px;
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px;
      margin-bottom:24px;
      box-shadow:0 4px 24px rgba(0,0,0,.35);
    }
    .gw-btn {
      font-family:'Orbitron',sans-serif;
      font-size:.72rem; font-weight:700;
      padding:8px 4px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--bg-primary);
      color:var(--text-muted);
      cursor:pointer;
      text-align:center;
      transition:.2s;
      position:relative;
    }
    .gw-btn:hover { border-color:var(--blue-accent); color:var(--blue-accent); background:rgba(59,130,246,.07); }
    .gw-btn.played  { border-color:rgba(34,197,94,.3); color:rgba(34,197,94,.8); }
    .gw-btn.current { border-color:var(--gold); color:var(--gold); box-shadow:0 0 8px rgba(251,191,36,.25); }
    .gw-btn.active  { background:var(--blue-accent)!important; border-color:var(--blue-accent)!important; color:#fff!important; box-shadow:0 0 12px rgba(59,130,246,.4); }
    /* small dot on played */
    .gw-btn.played::after { content:''; position:absolute; top:4px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--green); }
    .gw-btn.active::after { display:none; }

    /* GW CONTENT PANEL */
    .gw-panel {
      background:var(--bg-card);
      border:1px solid var(--border);
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 4px 24px rgba(0,0,0,.4);
    }
    .gw-panel-hdr {
      padding:14px 20px;
      background:linear-gradient(90deg,#1d4ed8,#2563eb);
      display:flex; align-items:center; justify-content:space-between;
      font-weight:800; font-size:.92rem;
    }
    .gw-panel-body { padding:18px; }

    /* MATCH CARDS */
    .fix-card {
      background:var(--bg-primary);
      border:1px solid var(--border);
      border-radius:12px;
      padding:18px 16px;
      margin-bottom:10px;
      transition:border-color .2s, transform .2s;
    }
    .fix-card:last-child { margin-bottom:0; }
    .fix-card:hover { border-color:var(--blue-accent); transform:translateY(-2px); }
    .fix-card.bye-fix { opacity:.55; border-style:dashed; }

    .fix-row { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:14px; }
    .fix-team { display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; }

    .fix-icon { width:58px; height:58px; border-radius:14px; background:var(--bg-card); border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:2.1rem; transition:border-color .2s; }
    .fix-card:hover .fix-icon { border-color:var(--blue-accent); }
    .fix-name { font-weight:800; font-size:.92rem; }
    .fix-role { font-size:.72rem; color:var(--text-muted); }

    .fix-score { display:flex; flex-direction:column; align-items:center; gap:7px; }
    .fix-nums {
      font-family:'Orbitron',sans-serif;
      font-size:2rem; font-weight:900;
      letter-spacing:4px;
    }
    .fix-tag { font-size:.66rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; padding:2px 10px; border-radius:10px; }
    .fix-tag.done { background:rgba(34,197,94,.15); color:var(--green); }
    .fix-tag.live { background:rgba(251,191,36,.15); color:var(--gold); animation:pulse 1.4s infinite; }
    .fix-tag.soon { background:rgba(59,130,246,.15); color:var(--blue-accent); }
    .fix-tag.bye  { background:rgba(100,116,139,.15); color:var(--text-muted); }

    /* full-bye week */
    .full-bye { padding:48px 20px; text-align:center; color:var(--text-muted); }
    .full-bye .bi { font-size:2.5rem; margin-bottom:12px; }

    /* state */
    .state-box { text-align:center; padding:48px 20px; color:var(--text-muted); }
    .spinner { width:40px; height:40px; border:3px solid rgba(59,130,246,.2); border-top-color:var(--blue-accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }

    /* meta */
    .meta-footer { margin-top:32px; display:flex; flex-wrap:wrap; gap:14px; justify-content:center; }
    .meta-chip { background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:9px 18px; font-size:.81rem; color:var(--text-muted); display:flex; align-items:center; gap:7px; }
    .meta-chip span { color:var(--text-primary); font-weight:700; }

    @keyframes spin  { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp .25s ease forwards; }

    @media (max-width:768px) {
      .nav-links { display:none; flex-direction:column; position:fixed; top:var(--nav-h); left:0; right:0; background:rgba(15,23,42,.97); border-bottom:1px solid var(--border); padding:10px 16px 18px; z-index:999; }
      .nav-links.open { display:flex; }
      .nav-links a { height:auto; padding:11px 14px; border-bottom:none; border-radius:8px; width:100%; }
      .nav-links a.active { background:rgba(59,130,246,.12); }
      .hamburger { display:flex; }
      .fix-nums { font-size:1.4rem; letter-spacing:2px; }
      .fix-icon  { width:46px; height:46px; font-size:1.6rem; }
    }
    @media (max-width:480px) {
      .gw-grid { grid-template-columns:repeat(auto-fill,minmax(46px,1fr)); gap:5px; padding:12px; }
      .gw-btn  { font-size:.65rem; padding:7px 2px; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="site-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M6 2h12v6a6 6 0 01-12 0V2z"/><path d="M6 4H3a2 2 0 000 4h3"/><path d="M18 4h3a2 2 0 010 4h-3"/><path d="M12 14v4"/><path d="M8 22h8"/><path d="M9 18h6"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-ar">الحمله</span>
        <span class="logo-en">El7amla · 2v2 Fantasy</span>
      </div>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="index.html">🏠 الرئيسية</a>
      <a href="teams.html">👥 الفرق</a>
      <a href="standings.html">📊 الترتيب</a>
      <a href="fixtures.html" class="active">📅 المباريات</a>
    </div>
    <button class="hamburger" onclick="document.getElementById('nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- PAGE -->
<div class="page-wrap">

  <div class="page-header">
    <div class="page-title">جدول المباريات</div>
    <div class="page-sub">38 جولة — الموسم 2025 / 26</div>
  </div>

  <!-- GW BUTTONS GRID -->
  <div class="gw-grid" id="gw-grid">
    <!-- built by JS -->
  </div>

  <!-- MATCH PANEL -->
  <div class="gw-panel">
    <div class="gw-panel-hdr">
      <span id="panel-title">اختر جولة</span>
      <span id="panel-status"></span>
    </div>
    <div class="gw-panel-body" id="panel-body">
      <div class="state-box"><div class="spinner"></div><p>جارٍ التحميل…</p></div>
    </div>
  </div>

  <!-- META -->
  <div class="meta-footer" id="meta-footer" style="display:none">
    <div class="meta-chip">🗓️ الجولة الحالية: <span id="meta-gw">—</span></div>
    <div class="meta-chip">📅 آخر تحديث: <span id="meta-updated">—</span></div>
  </div>

</div>

<script>
const RAW = "https://raw.githubusercontent.com/El7amla/El7amla_WebSite/main";
const TEAM_META = {
  "Falcons":      { color:"#3b82f6", em:"🦅" },
  "Smokers":      { color:"#22c55e", em:"💨" },
  "Black Tech":   { color:"#a855f7", em:"💻" },
  "Boys":         { color:"#f97316", em:"⚽" },
  "The Pharaohs": { color:"#eab308", em:"🏺" },
};

let fixtures  = {};
let currentGW = 1;
let selectedGW = null;

async function init() {
  try {
    const [standings, fixturesData] = await Promise.all([
      fetch(`${RAW}/data/current_standings.json?v=${Date.now()}`).then(r => r.json()),
      fetch(`${RAW}/fixtures.json?v=${Date.now()}`).then(r => r.json()),
    ]);
    fixtures  = fixturesData.fixtures || {};
    currentGW = standings.current_gw || 1;

    document.getElementById('meta-gw').textContent      = currentGW;
    document.getElementById('meta-updated').textContent  = standings.last_updated || '—';
    document.getElementById('meta-footer').style.display = 'flex';

    buildGrid();
    selectGW(currentGW);
  } catch(e) {
    document.getElementById('panel-body').innerHTML =
      `<div class="state-box"><div style="font-size:2rem">⚠️</div><p>فشل تحميل البيانات</p></div>`;
  }
}

function buildGrid() {
  const grid = document.getElementById('gw-grid');
  let html = '';
  for (let gw = 1; gw <= 38; gw++) {
    const played  = gw < currentGW;
    const isCur   = gw === currentGW;
    let cls = 'gw-btn';
    if (played)  cls += ' played';
    if (isCur)   cls += ' current';
    html += `<button class="${cls}" id="gwb-${gw}" onclick="selectGW(${gw})">${gw}</button>`;
  }
  grid.innerHTML = html;
}

function selectGW(gw) {
  /* De-activate old */
  if (selectedGW) {
    const old = document.getElementById(`gwb-${selectedGW}`);
    if (old) old.classList.remove('active');
  }
  selectedGW = gw;
  const btn = document.getElementById(`gwb-${gw}`);
  if (btn) btn.classList.add('active');

  renderGW(gw);
  document.getElementById('gw-panel').scrollIntoView?.({ behavior:'smooth', block:'nearest' });
}

function renderGW(gw) {
  const matchups = fixtures[String(gw)] || [];
  const played   = gw < currentGW;
  const isCur    = gw === currentGW;

  const statusLabel = isCur ? 'جارية الآن' : played ? 'انتهت' : 'قادمة';
  const statusTag   = isCur ? 'live' : played ? 'done' : 'soon';

  document.getElementById('panel-title').textContent = `الجولة ${gw}`;
  document.getElementById('panel-status').innerHTML  =
    `<span class="fix-tag ${statusTag}">${statusLabel}</span>`;

  const allBye = matchups.every(m => m[0] === "BYE" && m[1] === "BYE");
  if (allBye) {
    document.getElementById('panel-body').innerHTML = `
      <div class="full-bye fade-up">
        <div class="bi">😴</div>
        <div style="font-weight:800;font-size:1rem;margin-bottom:6px">جولة راحة كاملة</div>
        <div style="font-size:.85rem">لا توجد مباريات في هذه الجولة</div>
      </div>`;
    return;
  }

  const html = matchups.map(m => {
    const [home, away] = m;

    /* Single BYE */
    if (home === "BYE" || away === "BYE") {
      const team = home === "BYE" ? away : home;
      const meta = TEAM_META[team] || { em:"⚽", color:"#64748b" };
      return `
        <div class="fix-card bye-fix fade-up">
          <div class="fix-row">
            <div class="fix-team">
              <div class="fix-icon" style="border-color:${meta.color}">${meta.em}</div>
              <div class="fix-name">${team}</div>
            </div>
            <div class="fix-score">
              <div class="fix-nums" style="font-size:1rem;color:var(--text-muted)">BYE</div>
              <div class="fix-tag bye">راحة</div>
            </div>
            <div class="fix-team"></div>
          </div>
        </div>`;
    }

    const hMeta = TEAM_META[home] || { em:"⚽", color:"#64748b" };
    const aMeta = TEAM_META[away] || { em:"⚽", color:"#64748b" };

    return `
      <div class="fix-card fade-up">
        <div class="fix-row">
          <div class="fix-team">
            <div class="fix-icon" style="border-color:${hMeta.color}">${hMeta.em}</div>
            <div class="fix-name">${home}</div>
            <div class="fix-role">الضيف</div>
          </div>
          <div class="fix-score">
            <div class="fix-nums" style="color:var(--text-muted);font-size:1.2rem">VS</div>
            <div class="fix-tag ${statusTag}">${statusLabel}</div>
          </div>
          <div class="fix-team">
            <div class="fix-icon" style="border-color:${aMeta.color}">${aMeta.em}</div>
            <div class="fix-name">${away}</div>
            <div class="fix-role">الضيف</div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('panel-body').innerHTML = html ||
    `<div class="state-box"><div style="font-size:2rem">📭</div><p>لا توجد مباريات</p></div>`;
}

init();
</script>
</body>
</html>
